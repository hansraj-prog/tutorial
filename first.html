<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(to right, #4facfe, #00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            width:300px;
            padding:20px;
            text-align:center;
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }

        img{
            width:120px;
            height:120px;
            border-radius:50%;
        }

        h2{
            margin:10px 0;
        }

        p{
            color:gray;
        }

        button{
            background:#4facfe;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:20px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0077ff;
        }
    </style>
</head>

<body>

<div class="card">
    <img src="https://via.placeholder.com/120" alt="Profile">
    <h2>hansraj</h2>
    <p>Beginner Web Developer</p>
    <button>Contact Me</button>
</div>

</body>
</html>
